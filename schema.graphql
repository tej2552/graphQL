type Game{
    id: ID!
    title: String!
    platform: [String!]!
    reviews: [Review!]
}

type Review{
    id: ID!
    rating: Int!
    comment: String
    game_id: ID!
    author_id: ID!
    game: Game!
    author: Author!
}

type Author{
    id: ID!
    name: String!
    verified: Boolean!
    reviews: [Review!]
}

type Query{
    games: [Game!]!
    reviews: [Review!]!
    authors: [Author!]!

    review(id: ID!): Review
    game(id: ID!): Game
    author(id: ID!): Author
}

type Mutation{
    deleteGame(id: ID!): [Game!]
    addGame(input: GameInput): [Game!]
    updateGame(id: ID!, edit: editGameInput): [Game!]
}

input GameInput{
    title: String!
    platform: [String!]!
}

input editGameInput{
    title: String
    platform: [String!]
}